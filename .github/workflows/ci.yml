name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test / vet / fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt -l
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "unformatted files detected:"
            echo "$out"
            echo ""
            echo "请在本地运行: gofmt -w ."
            exit 1
          fi

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod/go.sum 与源码不一致，请在本地运行: go mod tidy"
            exit 1
          fi

      - name: build
        run: go build ./...

      - name: test
        run: go test -race -cover -coverprofile=coverage.out ./...

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1
