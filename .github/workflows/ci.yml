name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go (vet / fmt / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      # golangci-lint 抓更多问题(errcheck / ineffassign / unused / misspell / revive 等)
      # action@v9 + lint v2.x:v1.x(@v6 latest=v1.64.8 用 Go1.24 编译)拒绝 lint Go1.25 代码。
      # .golangci.yml 本就是 version: "2",所以必须用 v9 action(走 v2 系列 lint)。
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: gofmt -l
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "unformatted files detected:"
            echo "$out"
            echo ""
            echo "请在本地运行: gofmt -w ."
            exit 1
          fi

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod/go.sum 与源码不一致，请在本地运行: go mod tidy"
            exit 1
          fi

      - name: build
        run: go build ./...

      - name: test
        run: go test -race -cover -coverprofile=coverage.out ./...

      - name: coverage gate
        run: scripts/check-go-coverage.sh

  web:
    name: Web (vue-tsc / vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci --ignore-scripts

      # vitest:bridge / toast 等 lib 层单测。null.length 崩页 regression guard 在这里。
      - name: vitest
        run: npm test

      # npm run build = vue-tsc --noEmit && vite build,类型检查 + 产物构建
      - name: vue-tsc + vite build
        run: npm run build

  desktop:
    name: Desktop (macOS .app build)
    # macOS runner 慢且配额贵,只在 push main / PR 上跑是可接受的。
    # .app 打包包括:web 构建 + Go(+cgo WebKit/UniformTypeIdentifiers) + sips/iconutil
    # 做 .icns + Info.plist。任何一步在代码改动后坏掉这里会第一时间发现。
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: make desktop-app
        run: make desktop-app

      # 校验 .app bundle 三件套齐全(可执行二进制 / Info.plist / icon.icns)。
      # 不做启动测试(GitHub macOS runner 没 GUI),只确认打包正确。
      - name: verify .app bundle structure
        run: |
          set -e
          test -f dist/TroubleshooterStudio.app/Contents/MacOS/TroubleshooterStudio
          test -f dist/TroubleshooterStudio.app/Contents/Info.plist
          test -f dist/TroubleshooterStudio.app/Contents/Resources/icon.icns
          file dist/TroubleshooterStudio.app/Contents/MacOS/TroubleshooterStudio
          echo "✓ .app bundle structure OK"

  # ── Release:main 上自动打 tag + 发 GitHub Release(对偶 .gitlab-ci.yml release:*)─
  # 拓扑:
  #   release-patch: main 上默认自动跑(commit msg 无 [release:minor/major] 时)
  #   release-minor: commit msg 含 [release:minor] 自动跑
  #   release-major: commit msg 含 [release:major] 自动跑
  # if 三 job 互斥,一次 main push 只触发一个。
  # 共用 scripts/release.sh:算下一版本 → tag annotation → push tag →
  # make release-publish-github(desktop-dmg + 跨平台 CLI build + gh release create/upload)。
  #
  # 前置:
  #   1) 仓库已有至少一个 vX.Y.Z 严格格式 tag(release.sh 从上一 tag bump,无 tag 拒跑)
  #      初次:本地 git push troubleshooter-studio-github --tags 把历史 tag 全推上去
  #   2) GITHUB_TOKEN 默认 readonly,本 workflow 已显式声明 permissions.contents=write
  release-patch:
    name: Release (patch — auto)
    runs-on: macos-latest
    needs: [go, web, desktop]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[release:minor]') && !contains(github.event.head_commit.message, '[release:major]') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # release.sh 需全 history 算 changelog + 上一 tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # release.sh push 需要在 branch 上(detached HEAD 不行),且需 git identity
      - name: setup git identity & checkout main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main "${{ github.sha }}"

      - name: release patch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TARGET: release-publish-github
          GITHUB_REPO: ${{ github.repository }}
        run: scripts/release.sh patch

  release-minor:
    name: Release (minor — commit msg [release:minor])
    runs-on: macos-latest
    needs: [go, web, desktop]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release:minor]') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: setup git identity & checkout main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main "${{ github.sha }}"
      - name: release minor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TARGET: release-publish-github
          GITHUB_REPO: ${{ github.repository }}
        run: scripts/release.sh minor

  release-major:
    name: Release (major — commit msg [release:major])
    runs-on: macos-latest
    needs: [go, web, desktop]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release:major]') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: setup git identity & checkout main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main "${{ github.sha }}"
      - name: release major
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TARGET: release-publish-github
          GITHUB_REPO: ${{ github.repository }}
        run: scripts/release.sh major
