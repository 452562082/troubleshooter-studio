# GitLab CI 等价于 .github/workflows/ci.yml,主要 gitlab 实例跑这份。
# 四类 job:
#   go                  — go vet / fmt / mod tidy / test -race -cover     (Docker)
#   web                 — npm ci + vue-tsc --noEmit + vite build          (Docker)
#   desktop             — make desktop-app 校验 Wails + .app 打包链        (需要 macos runner)
#   release:{p,m,M}     — main 上 manual,等价 make bump-{patch,minor,major}:
#                         算版本 → push tag → 多平台编 → 上传 GitLab Release
#
# desktop job 需要一台带 `macos` tag 的 gitlab-runner;公司内部如果没有,
# 当前是 allow_failure: true + when: manual,手动触发且失败不阻塞主 pipeline,
# 有 runner 后可以改成自动跑 + strict。
#
# release:* 一次性管理员配置(见 docs/CI-RELEASE.md):
#   1. CI/CD Variables:GITLAB_TOKEN(Project Access Token,scope=api+write_repository,masked+protected)
#   2. macos tag runner(打 dmg + 跨平台 binary)
#   3. Settings → Repository → Protected tags:加 v* pattern,允许 maintainer

stages:
  - test
  - build
  - release

variables:
  # 缓存到 project 下让 gitlab 的 cache: 抓得到
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go-mod"
  # Vite 在 CI 环境不要尝试打开浏览器 / 色彩输出
  CI: "true"
  FORCE_COLOR: "0"

# ── Go:vet / fmt / mod tidy / build / test + 覆盖率 ─────────────────────
go:
  stage: test
  image: golang:1.25
  cache:
    key:
      files:
        - go.sum
    paths:
      - .cache/go-build
      - .cache/go-mod
  script:
    - go vet ./...
    # golangci-lint(走 .golangci.yml 配置):抓 errcheck/ineffassign/unused/misspell 等
    - |
      GOLANGCI_VERSION=v2.0.2
      wget -qO- "https://github.com/golangci/golangci-lint/releases/download/${GOLANGCI_VERSION}/golangci-lint-${GOLANGCI_VERSION#v}-linux-amd64.tar.gz" | tar xz
      ./golangci-lint-${GOLANGCI_VERSION#v}-linux-amd64/golangci-lint run --timeout=3m
    - |
      out=$(gofmt -l .)
      if [ -n "$out" ]; then
        echo "unformatted files detected:"
        echo "$out"
        echo ""
        echo "请在本地运行: gofmt -w ."
        exit 1
      fi
    - |
      go mod tidy
      if ! git diff --exit-code go.mod go.sum; then
        echo "go.mod/go.sum 与源码不一致,请在本地运行: go mod tidy"
        exit 1
      fi
    - go build ./...
    - go test -race -cover -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out | tail -1
  # 覆盖率 % 抽到 GitLab UI 显示(总覆盖率那行是 "total: (statements) XX.X%")
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    paths:
      - coverage.out
    expire_in: 1 week

# ── Web:vue-tsc 类型检查 + vite 产物构建 ─────────────────────────────────
web:
  stage: test
  image: node:20
  cache:
    key:
      files:
        - web/package-lock.json
    paths:
      - web/node_modules
  script:
    - cd web
    - npm ci --prefer-offline --no-audit --no-fund
    # vitest: bridge / toast lib 层单测(regression guard)
    - npm test
    # npm run build 实际跑 vue-tsc --noEmit && vite build
    # 类型检查 + 产物构建一把,能抓类型漂移 + rollup 打包失败
    - npm run build
  artifacts:
    when: on_success
    paths:
      - web/dist
    expire_in: 1 week

# ── Desktop:macOS .app 打包 ──────────────────────────────────────────────
# 需要打了 `macos` tag 的 gitlab-runner(shared runner 默认没有,需要私有部署)。
# 没 runner 时 allow_failure + when: manual 让它不阻塞主 pipeline。
desktop:
  stage: build
  tags:
    - macos
  rules:
    # merge request 上手动触发一次,main push 自动触发
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual # 没 runner 时改 on_success 时需要手动触发,有 runner 可以去掉这行
      allow_failure: true
  # macos runner 要预装 Xcode Command Line Tools + Go + Node。
  # Wails cgo 链接需要 UniformTypeIdentifiers.framework,Makefile 里已经硬编码 CGO_LDFLAGS。
  script:
    - go version
    - node --version
    - make desktop-app
    # 校验 .app bundle 三件套(可执行二进制 / Info.plist / icon.icns)
    - test -f dist/TroubleshooterStudio.app/Contents/MacOS/TroubleshooterStudio
    - test -f dist/TroubleshooterStudio.app/Contents/Info.plist
    - test -f dist/TroubleshooterStudio.app/Contents/Resources/icon.icns
    - file dist/TroubleshooterStudio.app/Contents/MacOS/TroubleshooterStudio
    - echo "✓ .app bundle structure OK"
  artifacts:
    when: on_success
    paths:
      - dist/TroubleshooterStudio.app
    expire_in: 1 week

# ── Release:main 上 manual 触发,等价 make bump-{patch,minor,major} ──────
#
# 设计:不全自动(防 main 上每个 commit 都打版本)。在 GitLab Pipeline 页面看到 3 个按钮:
#   release:patch   - bug 修复版,vX.Y.Z → vX.Y.(Z+1)
#   release:minor   - 功能升级,vX.Y.Z → vX.(Y+1).0
#   release:major   - breaking change,vX.Y.Z → v(X+1).0.0
# 点哪个就跑哪个,跟本地 `make bump-{patch,minor,major}` 完全等价。
#
# 必须满足:
#  - GITLAB_TOKEN 已配 CI/CD Variables(masked + protected),token 拥有
#    api + write_repository scope 且账号是 maintainer 以上(才能 push tag 过
#    protected v* tag pattern + 调 GitLab Release API)
#  - 至少一台 macos 标签 runner 在线(make release-publish 需要 macOS Xcode 链 + dmg 打包)

.release-base:
  stage: release
  tags:
    - macos
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true   # 允许失败不阻塞主 pipeline(可能 macos runner 暂时下线)
  variables:
    # 拉全 history,changelog.sh / git describe --tags --abbrev=0 都依赖
    GIT_DEPTH: 0
  before_script:
    # 必备工具:jq 给 publish-gitlab-release.sh 解析 GitLab API JSON
    - command -v jq >/dev/null 2>&1 || brew install jq
    # GITLAB_TOKEN 是 release-publish + git push 共用的鉴权
    - test -n "$GITLAB_TOKEN" || { echo "✗ CI/CD Variables 缺 GITLAB_TOKEN(scope=api+write_repository)" >&2; exit 1; }
    # CI checkout 默认 detached HEAD;tag-and-release 跑 git push 需要在 branch 上
    - git checkout -B main "$CI_COMMIT_SHA"
    # tag-and-release 拿 git config user.* 写 tag annotation 的 Tagger 字段
    - git config user.name "${GITLAB_USER_NAME:-CI}"
    - git config user.email "${GITLAB_USER_EMAIL:-ci@${CI_SERVER_HOST}}"
    # remote URL 改成 oauth2 + GITLAB_TOKEN,git push 才有权限(默认 read-only)
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --tags --quiet

release:patch:
  extends: .release-base
  script:
    - scripts/release.sh patch

release:minor:
  extends: .release-base
  script:
    - scripts/release.sh minor

release:major:
  extends: .release-base
  script:
    - scripts/release.sh major
