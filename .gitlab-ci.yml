# GitLab CI 等价于 .github/workflows/ci.yml,主要 gitlab 实例跑这份。
# Job 拓扑(并行 / 串行 / manual):
#
#   stage: test                stage: build              stage: release
#   ┌──────────┐               ┌────────────┐            ┌─────────────────┐
#   │ go:lint  │──┐            │  desktop   │            │ release:patch   │
#   │ go:test  │  ├─ 全过 ────►│  needs web │ (manual)   │ release:minor   │ (3 选 1 manual)
#   │ web      │──┘            │            │            │ release:major   │
#   └──────────┘               └────────────┘            └─────────────────┘
#
# 触发(workflow rules):
#   - main push          → 跑全套
#   - test push          → 跑全套(当前开发分支直接 push 验证)
#   - merge_request      → 跑 go:lint / go:test / web(desktop 改成 manual 按钮可选)
#   - tag push(v*)      → 不跑(release job 已经在打 tag 那次 pipeline 里产出,
#                         tag 二次触发 pipeline 是浪费,且 release job 不会再选自己)
#   - 其它 branch push   → 不跑(只测试本仓 main 流;feature 分支测试在 MR 创建后)
#
# release:* 一次性管理员配置(见 docs/CI-RELEASE.md):
#   1. CI/CD Variables:GITLAB_TOKEN(Project Access Token,scope=api+write_repository,masked+protected)
#   2. macos tag runner(打 dmg + 跨平台 binary)
#   3. Settings → Repository → Protected tags:加 v* pattern,允许 maintainer

# 全局触发规则:控制 pipeline 什么时候启动
workflow:
  rules:
    # tag push(尤其本仓 release job 自己创建的 v* tag) → 跳,不让 tag 又触发一次完整 pipeline
    - if: '$CI_COMMIT_TAG'
      when: never
    # main 分支 push → 跑
    - if: '$CI_COMMIT_BRANCH == "main"'
    # test 分支 push → 跑,匹配当前开发分支的直接推送流程
    - if: '$CI_COMMIT_BRANCH == "test"'
    # MR pipeline → 跑(开 MR 时所有 commit 上 push 都触发)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # 其它情况不跑(feature 分支 push 不开 MR 时不消耗 CI)

stages:
  - test
  - build
  - release

variables:
  # 缓存到 project 下让 gitlab 的 cache: 抓得到
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go-mod"
  # Go 默认把 module 缓存设只读防 tamper,GitLab cache:archive 阶段试图清理时一堆
  # "failed to remove ...: Permission denied" warning;-modcacherw 让新下载的目录
  # 直接可写,根本不需要事后 chmod。
  GOFLAGS: "-modcacherw"
  # proxy.golang.org(google 域)国内不可达,统一走 goproxy.cn / goproxy.io,
  # 命中失败回落 direct(走目标仓库 git/HTTPS)。
  # GOSUMDB 用 google 官方在国内备的镜像(sum.golang.google.cn)。
  GOPROXY: "https://goproxy.cn,https://goproxy.io,direct"
  GOSUMDB: "sum.golang.google.cn"
  # Vite 在 CI 环境不要尝试打开浏览器 / 色彩输出
  CI: "true"
  FORCE_COLOR: "0"

# ── Go lint:golangci-lint + gofmt + mod tidy ────────────────────────────
# 拆 lint 跟 test 独立 job(原来串一坨,fmt 没过 → test 跑不到,反馈不全)。
#
# cache 策略(2026-05-18 重构,根治 v2-rw/v3-rw 反复 bump 都治不住的 cache 残缺):
#   - 只 cache .cache/go-mod(module download cache,按 module@version 路径寻址,
#     跨 image / 跨 ref 安全,坏了 go 工具链按 hash 校验自动重下)
#   - 不 cache .cache/go-build(fingerprint-indexed 的临时编译产物,Go 设计上就
#     ephemeral,被 GitLab 跨 image 打包/解包会出现"索引在但文件不在"导致 vet/build
#     报 no such file or directory。让每个 job 本地新建)
#   - lint / test 用不同 cache key 前缀:两 job image 不同(golangci-lint vs
#     golang:1.25.11),理论上 go-mod 内容兼容,但隔离避免任何"并行 job 同 key 写同一份"
#     的潜在竞态。
#   - go vet 那行删了 — golangci-lint 默认开 govet linter,重复且就是它在崩。
go:lint:
  stage: test
  # 用 golangci-lint 官方 image 自带 go + 二进制,**省下每次 wget GitHub release 解压**(老逻辑 ~10s + 依赖 GitHub 可达)
  # 版本必须 ≥ go.mod 目标 Go 版本对应的 golangci-lint(linter 只能 lint ≤ 自身构建 Go 版本的项目):
  # go.mod 是 go1.25 → v2.0.2(go1.24 构建)会 "can't load config: ... lower than targeted Go version 1.25" 直接挂。
  # v2.4.0 起用 go1.25 构建,v2.9.0 起用 go1.26 构建(兼容 lint go1.25)。这里钉 v2.12.2 跟
  # .github/workflows/ci.yml 的 golangci-lint-action version 对齐,两边 CI 同一 linter 版本不漂移。
  image: golangci/golangci-lint:v2.12.2
  interruptible: true
  cache:
    key:
      prefix: "lint-v1"
      files:
        - go.sum
    paths:
      - .cache/go-mod
  script:
    - golangci-lint run --timeout=3m
    - |
      # gofmt 接到目录参数会**递归扫子目录**;`gofmt -l .` 或 `gofmt -l $(go list ...)`
      # 都会进 $GOMODCACHE=.cache/go-mod 把第三方源码扫上(那不归我们格式化)。
      # 用 `git ls-files -z '*.go'` 只列**入库**的 .go 文件,.cache 是 gitignored 自动跳过,
      # 且 CI 本来就只该校验提交代码的格式。
      out=$(git ls-files -z '*.go' | xargs -0 gofmt -l)
      if [ -n "$out" ]; then
        echo "unformatted files detected:"
        echo "$out"
        echo "请在本地运行: gofmt -w ."
        exit 1
      fi
    - |
      go mod tidy
      if ! git diff --exit-code go.mod go.sum; then
        echo "go.mod/go.sum 与源码不一致,请在本地运行: go mod tidy"
        exit 1
      fi

# ── Go test:build + test -race -cover ──────────────────────────────────
go:test:
  stage: test
  # 锁定 patch 版本(避免 cache 锁住老 patch + 跟 go.mod `go 1.25.11` 一致)。
  # 1.25.11 修复当前 govulncheck 命中的 stdlib CVE,保持工具链审计干净。
  image: golang:1.25.11
  interruptible: true
  cache:
    # cache 策略说明见 go:lint 上方注释。test job 独立 key 前缀,避免与 lint job 并行写竞态。
    key:
      prefix: "test-v1"
      files:
        - go.sum
    paths:
      - .cache/go-mod
  script:
    - go build ./...
    - go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
    - |
      "$(go env GOPATH)/bin/govulncheck" ./...
    - go test -race -cover -coverprofile=coverage.out ./...
    - scripts/check-go-coverage.sh
    - go tool cover -func=coverage.out | tail -1
  # 覆盖率 % 抽到 GitLab UI 显示(总覆盖率那行是 "total: (statements) XX.X%")
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    paths:
      - coverage.out
    expire_in: 1 week

# ── Workspace skill scripts:生成物机器人脚本单测 ─────────────────────────────
skill-scripts:
  stage: test
  image: python:3.12-slim
  interruptible: true
  before_script:
    - python3 -m pip install --no-cache-dir pytest PyYAML uv
  script:
    - scripts/test-skill-scripts.sh

# ── Browser collector real smoke:手动触发,安装 Chromium 后跑真实 Playwright 路径 ─────
browser-smoke:
  stage: test
  image: node:20.19.0
  interruptible: true
  rules:
    - when: manual
      allow_failure: true
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends python3
    - npm install --no-save --no-package-lock playwright
    - npx playwright install --with-deps chromium
  script:
    - scripts/test-browser-smoke.sh

# ── Web:vue-tsc 类型检查 + vite 产物构建 ─────────────────────────────────
# artifact 给 desktop job 复用,desktop 不再重跑 web build。
web:
  stage: test
  image: node:20.19.0
  interruptible: true
  cache:
    key:
      files:
        - web/package-lock.json
    paths:
      - web/node_modules
  # 双执行器兼容(2026-06:runner 从 macOS shell 切到 docker executor 后,旧的 brew/nvm
  # 硬假设在 node:20 容器里 `exit 1` —— 容器没 brew、/root/.nvm/nvm.sh 也不存在):
  #   - docker executor(现状,240-docker-runner):直接跑 `image: node:20.19.0`,
  #     满足 Vite 8 的 Node 下限,无 brew / 无 nvm → 直接用镜像自带 node。
  #   - macOS shell executor(历史/兜底):host 默认 node 25,需 nvm 读 .nvmrc 切换到项目指定版本,
  #     绕开 esbuild postinstall SIGKILL / vitest worker 死锁。
  # 策略:能找到 nvm 就用它切 .nvmrc;找不到回落系统 node。两种执行器都能跑,不再硬 exit 1。
  before_script:
    - |
      set +e
      export NVM_DIR="$HOME/.nvm"
      NVM_SH=""
      for cand in "$(brew --prefix nvm 2>/dev/null)/nvm.sh" "$HOME/.nvm/nvm.sh" "/usr/local/opt/nvm/nvm.sh" "/opt/homebrew/opt/nvm/nvm.sh"; do
        if [ -n "$cand" ] && [ "$cand" != "/nvm.sh" ] && [ -s "$cand" ]; then NVM_SH="$cand"; break; fi
      done
      if [ -n "$NVM_SH" ]; then
        echo "[ci] 用 nvm: $NVM_SH → 读 .nvmrc 切 node 版本"
        # nvm.sh 内大量 `[ -n "$VAR" ] && cmd` short-circuit,未设变量会返 1,
        # 故全程 set +e(本块末尾不再 set -e,交给后续逐行命令各自判定)。
        . "$NVM_SH"
        command -v nvm >/dev/null 2>&1 && { nvm install && nvm use; }
      else
        echo "[ci] 未找到 nvm(docker executor 场景),用 node:20.19.0 镜像自带 node"
      fi
      node --version || { echo "[ci] ERROR: 既无 nvm 也无系统 node,执行器环境异常"; exit 1; }
      npm --version
  script:
    - cd web
    # --ignore-scripts:跳过 esbuild 的 postinstall (node install.js)。
    # 现代 esbuild 用 platform-specific 子包 (@esbuild/<os>-<arch>),npm 安装时自动拉对应
    # 平台子包(docker 是 @esbuild/linux-x64,mac 是 darwin-arm64),postinstall 只是验证
    # 脚本——跳过不影响 vite build / vitest,且在 mac shell executor 的 node 25 上能避开
    # 旧 esbuild install.js SIGKILL(pipeline #652)。docker node:20 上同样安全。
    - npm ci --prefer-offline --no-audit --no-fund --ignore-scripts
    - npm audit --audit-level=moderate
    # vitest: bridge / toast lib 层单测(regression guard)
    - npm test
    # npm run build 实际跑 vue-tsc --noEmit && vite build
    # 类型检查 + 产物构建一把,能抓类型漂移 + rollup 打包失败
    - npm run build
    # vite 产物 (web/dist) 拷到 embed 目标,让下游 desktop job 用同一份不重复构建
    - rm -rf ../internal/webui/dist
    - mkdir -p ../internal/webui/dist
    - cp -R dist/. ../internal/webui/dist/
  artifacts:
    when: on_success
    paths:
      - web/dist
      - internal/webui/dist   # 关键:desktop job 拿这份直接 cgo 编 .app,跳过 npm 重 build
    expire_in: 1 week

# ── Desktop:macOS .app 打包 ──────────────────────────────────────────────
# 需要打了 `macos` tag 的 gitlab-runner(shared runner 默认没有,需要私有部署)。
# 没 runner 时 allow_failure + when: manual 让它不阻塞主 pipeline。
desktop:
  stage: build
  tags:
    - macos
  cache:
    key:
      prefix: "desktop-browser-v1"
      files:
        - internal/browserverify/runtime.go
        - internal/browserverify/worker/browser_worker.mjs
    paths:
      - .cache/desktop-browser-runtime
  # 复用 web 已 build 的 internal/webui/dist,跳过 npm ci + vite build(原来重复跑 ~2-3 min)
  needs:
    - job: web
      artifacts: true
  rules:
    # merge request 上手动触发一次,main push 也手动触发(macos runner 排队贵,不全自动)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
  # macos runner 要预装 Xcode Command Line Tools + Go + Node。
  # Wails cgo 链接需要 UniformTypeIdentifiers.framework,Makefile 里已经硬编码 CGO_LDFLAGS。
  # WEB_PRE_BUILT=1 让 Makefile 跳过 web 子任务(已经从 artifact 拿到 internal/webui/dist)
  script:
    - go version
    # 注:整条必须**单行写**。YAML plain scalar 多行会把换行折叠成空格,行尾 `\` 续行
    # 会变成字面量 `\ `(反斜杠+空格)塞进命令,导致 `test ... \ || ...` 里 test 把 `||`
    # 当二元操作符报 "binary operator expected"(pipeline #1008 desktop job 实测踩坑)。
    - test -d internal/webui/dist && test -f internal/webui/dist/index.html || { echo "✗ 没拿到 web artifact(internal/webui/dist),需要先跑 web job" >&2; exit 1; }
    - SKIP_WEB_BUILD=1 make desktop-app
    # 校验 .app bundle 三件套(可执行二进制 / Info.plist / icon.icns)
    - test -f dist/TroubleshooterStudio.app/Contents/MacOS/TroubleshooterStudio
    - test -f dist/TroubleshooterStudio.app/Contents/Info.plist
    - test -f dist/TroubleshooterStudio.app/Contents/Resources/icon.icns
    - |
      runtime_root=dist/TroubleshooterStudio.app/Contents/Resources/browser-runtime
      test "$(find "$runtime_root" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')" = 1
      runtime_dir="$(find "$runtime_root" -mindepth 1 -maxdepth 1 -type d)"
      test -f "$runtime_dir/.runtime-ready.json"
      test -d "$runtime_dir/browsers"
    - file dist/TroubleshooterStudio.app/Contents/MacOS/TroubleshooterStudio
    - echo "✓ .app bundle structure OK"
  artifacts:
    when: on_success
    paths:
      - dist/TroubleshooterStudio.app
    expire_in: 1 week

# ── Release:main 上 manual 触发,等价 scripts/release.sh patch|minor|major ──
#
# 设计:
#   release:patch   - bug 修复版,vX.Y.Z → vX.Y.(Z+1) —— **main 上自动触发**(默认每次 main 合入打补丁版本)
#   release:minor   - 功能升级,vX.Y.Z → vX.(Y+1).0 —— commit msg 含 [release:minor] 时自动;否则 manual 按钮
#   release:major   - breaking change,vX.Y.Z → v(X+1).0.0 —— commit msg 含 [release:major] 时自动;否则 manual 按钮
#
# 工作流:test 分支开发 → MR test→main → 合并到 main 时:
#   - 默认 → auto patch(vX.Y.Z → vX.Y.(Z+1))
#   - merge commit 或 squash msg 含 [release:minor] → auto minor(patch 跳过,只跑 minor)
#   - merge commit 或 squash msg 含 [release:major] → auto major(patch 跳过,只跑 major)
#
# 一次合并永远只产出 1 个 release。manual 按钮保留兜底(应急/runner 故障重发)。
#
# 必须满足:
#  - GITLAB_TOKEN 已配 CI/CD Variables(masked + protected),token 拥有
#    api + write_repository scope 且账号是 maintainer 以上(才能 push tag 过
#    protected v* tag pattern + 调 GitLab Release API)
#  - 至少一台 macos 标签 runner 在线(make release-publish 需要 macOS Xcode 链 + dmg 打包)

.release-base:
  stage: release
  tags:
    - macos
  # 默认 manual(minor/major 用) —— release:patch 在自己 job 里覆盖成 auto
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true   # 允许失败不阻塞主 pipeline(可能 macos runner 暂时下线)
  variables:
    # 拉全 history,changelog.sh / git describe --tags --abbrev=0 都依赖
    GIT_DEPTH: 0
    # 强制每次新鲜 clone,跳过浅→全量 `--unshallow` 升级路径。
    # 2026-05-12 撞过坑:其它 job 默认 GIT_DEPTH=20 留下的 build dir 被 release job 复用,
    # `--unshallow` 在 sideband 协议协商卡 19 分钟到 SIGTERM(14 MiB 小仓库都拖死)。
    # 单次 clone 走的 protocol 路径更短,不依赖本地浅克隆 boundary 状态。代价是每次多几秒。
    GIT_STRATEGY: clone
    # partial clone:跳过 blob 内容下载,只拉 commit/tree metadata,blob 按需 lazy fetch。
    # 2026-05-14 撞过 git fetch 跟 Gitaly sideband 协商在 "Created fresh repository." 之后卡 11+ 分钟,
    # 复刻 2026-05-12 unshallow 同款症状 — fresh clone 在小仓库也撞,protocol 路径短不代表稳。
    # changelog.sh 只 git log --no-merges 拿 commit subject,git describe 拿 tag,都不读 blob 内容;
    # release-publish 实际编 binary / 打 dmg 时才会 lazy fetch 需要的 blob,且只补当前 checkout 那批,
    # 不补全历史 blob → fetch 时间预计压到 1/5。需要 Git 2.19+ + GitLab Runner 14+(已满足)。
    GIT_FETCH_EXTRA_FLAGS: "--filter=blob:none"
  # release 流程长(编 + 上传),设 30 min 防 runner 卡死无限挂
  timeout: 30 minutes
  # release 不能 interruptible,跑一半被打断会留半截脏 tag/release 状态
  interruptible: false
  before_script:
    # 必备工具:jq 给 publish-gitlab-release.sh 解析 GitLab API JSON
    - command -v jq >/dev/null 2>&1 || brew install jq
    # GITLAB_TOKEN 是 release-publish + git push 共用的鉴权
    - test -n "$GITLAB_TOKEN" || { echo "✗ CI/CD Variables 缺 GITLAB_TOKEN(scope=api+write_repository)" >&2; exit 1; }
    # CI checkout 默认 detached HEAD;scripts/release.sh 跑 git push 需要在 branch 上
    - git checkout -B main "$CI_COMMIT_SHA"
    # tag 的 Tagger 字段
    - git config user.name "${GITLAB_USER_NAME:-CI}"
    - git config user.email "${GITLAB_USER_EMAIL:-ci@${CI_SERVER_HOST}}"
    # remote URL 改成 oauth2 + GITLAB_TOKEN,git push 才有权限(默认 read-only)
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    # tag 可达性恢复(pipeline #1013 release:patch 实测踩坑):
    #   release.sh 算版本号靠 `git describe --tags`(要 tag 是 HEAD 祖先可达),
    #   changelog.sh 靠 `git log <lasttag>..HEAD`(要区间 history),两者都需要完整历史。
    #   本意是上方 GIT_DEPTH:0 给全克隆,但实测 checkout 仍是 depth=1 浅克隆
    #   (yaml 的 GIT_DEPTH:0 被 project 级 CI/CD 变量 / "Git shallow clone" 设置覆盖,
    #    二者优先级都高于 .gitlab-ci.yml)→ 老 tag 指向的 commit 不在浅 history → describe 返空
    #    → release.sh 误判"仓库还没 tag"直接退出。
    #   用有界 `--deepen` 把分支历史补到足够深(release 频繁,上一 tag 离 HEAD 很近);
    #   配 `--filter=blob:none` 只拉 commit/tree metadata,避开本 Gitaly 上 `--unshallow`
    #   全量 blob 协商 11-19min 卡死的老坑(见上方 .release-base variables 注释)。
    #   非浅克隆(若哪天 GIT_DEPTH:0 真生效)走 else 普通 fetch,不会被 deepen 误截断历史。
    - |
      if [ -f "$(git rev-parse --git-dir)/shallow" ]; then
        echo "[release] 检测到浅克隆,deepen 历史恢复 tag 可达性"
        git fetch --tags --deepen=2000 --filter=blob:none --quiet 2>/dev/null \
          || git fetch --tags --deepen=2000 --quiet 2>/dev/null \
          || git fetch --tags --unshallow --quiet 2>/dev/null \
          || git fetch --tags --quiet
      else
        git fetch --tags --quiet
      fi
    # 探活:确认能 describe 出 tag,否则提前给清晰诊断(而非 release.sh 里"没 tag"误导)
    - |
      if ! git describe --tags --abbrev=0 >/dev/null 2>&1; then
        echo "✗ deepen 后仍无可达 tag。请检查 Settings→CI/CD→Variables 是否有 GIT_DEPTH" >&2
        echo "  或 Settings→CI/CD→General pipelines→Git shallow clone 把它调成 0;" >&2
        echo "  远端确有 tag(git ls-remote --tags)时才会走到这里。" >&2
        exit 1
      fi

release:patch:
  extends: .release-base
  rules:
    # commit msg 含 [release:minor] 或 [release:major] 时跳过 patch,让对应 job 接管
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[release:(minor|major)\]/'
      when: never
    # 默认 main 合入 → 自动 patch(每次 PR 合并 → vX.Y.(Z+1))
    - if: '$CI_COMMIT_BRANCH == "main"'
      allow_failure: true   # macos runner 暂时下线时不挡 pipeline 状态
  script:
    - scripts/release.sh patch

release:minor:
  extends: .release-base
  rules:
    # commit msg 含 [release:minor] → 自动跑(取代默认 patch)
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[release:minor\]/'
      allow_failure: true
    # 否则保持 manual 按钮兜底
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
  script:
    - scripts/release.sh minor

release:major:
  extends: .release-base
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[release:major\]/'
      allow_failure: true
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
  script:
    - scripts/release.sh major
