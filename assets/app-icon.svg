<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 跟 logo.svg 用同一套色调：蓝紫 g1 + 橙红 g2 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="robot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="18" result="offsetblur"/>
      <feFlood flood-color="#1E293B" flood-opacity="0.25"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- AI 机器人（排障机器人主图，居中放大） -->
  <g transform="translate(512, 512)" filter="url(#shadow)">
    <!-- 天线 -->
    <line x1="0" y1="-260" x2="0" y2="-340" stroke="#F97316" stroke-width="18" stroke-linecap="round"/>
    <circle cx="0" cy="-356" r="32" fill="#F97316"/>
    <!-- 头(身体) -->
    <rect x="-260" y="-260" width="520" height="440" rx="72" fill="url(#robot)"/>
    <!-- 两个眼睛 -->
    <circle cx="-100" cy="-90" r="60" fill="white"/>
    <circle cx="100" cy="-90" r="60" fill="white"/>
    <circle cx="-88" cy="-90" r="28" fill="#1E293B"/>
    <circle cx="112" cy="-90" r="28" fill="#1E293B"/>
    <!-- 眼睛高光（生气的小点缀） -->
    <circle cx="-96" cy="-102" r="10" fill="white" opacity="0.8"/>
    <circle cx="104" cy="-102" r="10" fill="white" opacity="0.8"/>
    <!-- 嘴（表情条纹带） -->
    <rect x="-130" y="36" width="260" height="42" rx="20" fill="#FEF3C7"/>
    <line x1="-80" y1="36" x2="-80" y2="78" stroke="#F97316" stroke-width="8"/>
    <line x1="-20" y1="36" x2="-20" y2="78" stroke="#F97316" stroke-width="8"/>
    <line x1="40" y1="36" x2="40" y2="78" stroke="#F97316" stroke-width="8"/>
    <line x1="100" y1="36" x2="100" y2="78" stroke="#F97316" stroke-width="8"/>
  </g>

  <!-- 底部：三个机器人卡片缩影，暗示"工作台/管理多个机器人" -->
  <g transform="translate(512, 870)">
    <rect x="-220" y="0" width="120" height="50" rx="12" fill="white" opacity="0.32"/>
    <rect x="-60" y="0" width="120" height="50" rx="12" fill="white" opacity="0.5"/>
    <rect x="100" y="0" width="120" height="50" rx="12" fill="white" opacity="0.32"/>
    <circle cx="-190" cy="25" r="8" fill="#22C55E"/>
    <circle cx="-30" cy="25" r="8" fill="#22C55E"/>
    <circle cx="130" cy="25" r="8" fill="#F59E0B"/>
  </g>
</svg>
