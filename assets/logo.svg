<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" width="780" height="220">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- Studio / desktop app window（顶部 title bar + traffic lights + 内容区） -->
  <g transform="translate(30, 30)">
    <!-- 窗口整体 -->
    <rect x="0" y="0" width="140" height="140" rx="10" fill="url(#g1)"/>
    <!-- title bar -->
    <rect x="0" y="0" width="140" height="22" rx="10" fill="#1E293B" opacity="0.35"/>
    <rect x="0" y="14" width="140" height="8" fill="#1E293B" opacity="0.35"/>
    <!-- traffic lights -->
    <circle cx="11" cy="11" r="3.5" fill="#EF4444"/>
    <circle cx="22" cy="11" r="3.5" fill="#F59E0B"/>
    <circle cx="33" cy="11" r="3.5" fill="#22C55E"/>
    <!-- 内容：模拟机器人管理卡片列表 -->
    <rect x="15" y="38" width="110" height="16" rx="3" fill="#DBEAFE" opacity="0.9"/>
    <rect x="15" y="58" width="110" height="16" rx="3" fill="#DBEAFE" opacity="0.85"/>
    <rect x="15" y="78" width="110" height="16" rx="3" fill="#DBEAFE" opacity="0.8"/>
    <!-- 卡片上的状态点（"已装机器人"列表的意象） -->
    <circle cx="22" cy="46" r="3" fill="#22C55E"/>
    <circle cx="22" cy="66" r="3" fill="#22C55E"/>
    <circle cx="22" cy="86" r="3" fill="#F59E0B"/>
    <!-- 底部 CTA 按钮 -->
    <rect x="40" y="108" width="60" height="20" rx="4" fill="url(#g2)"/>
    <rect x="54" y="115" width="32" height="2" rx="1" fill="white" opacity="0.9"/>
    <rect x="50" y="120" width="40" height="2" rx="1" fill="white" opacity="0.7"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(185, 90)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
    <polygon points="40,-6 52,0 40,6" fill="#94A3B8"/>
  </g>

  <!-- AI Agent icon -->
  <g transform="translate(245, 50)">
    <rect x="0" y="20" width="80" height="70" rx="12" fill="url(#g2)"/>
    <line x1="40" y1="20" x2="40" y2="5" stroke="url(#g2)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40" cy="3" r="5" fill="url(#g2)"/>
    <circle cx="25" cy="48" r="8" fill="white"/>
    <circle cx="55" cy="48" r="8" fill="white"/>
    <circle cx="27" cy="48" r="4" fill="#1E293B"/>
    <circle cx="57" cy="48" r="4" fill="#1E293B"/>
    <rect x="20" y="68" width="40" height="6" rx="3" fill="#FEF3C7"/>
    <line x1="30" y1="68" x2="30" y2="74" stroke="url(#g2)" stroke-width="1"/>
    <line x1="40" y1="68" x2="40" y2="74" stroke="url(#g2)" stroke-width="1"/>
    <line x1="50" y1="68" x2="50" y2="74" stroke="url(#g2)" stroke-width="1"/>
    <rect x="15" y="95" width="50" height="25" rx="6" fill="url(#g2)" opacity="0.7"/>
  </g>

  <!-- Text -->
  <g transform="translate(350, 55)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#1E293B">
      troubleshooter
    </text>
    <text y="48" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="url(#g1)">
      studio
    </text>
    <text y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#64748B">
      AI 排障机器人工作台 · 建模 / 生成 / 部署 / 管理
    </text>
  </g>

  <!-- Row 1: Config sources -->
  <g transform="translate(350, 148)" font-family="monospace" font-size="10">
    <text x="0" y="-4" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8" font-weight="600">配置源</text>
    <rect x="40" width="48" height="18" rx="4" fill="#FEE2E2"/>
    <text x="64" y="13" text-anchor="middle" fill="#DC2626">nacos</text>
    <rect x="92" width="48" height="18" rx="4" fill="#EDE9FE"/>
    <text x="116" y="13" text-anchor="middle" fill="#7C3AED">apollo</text>
    <rect x="144" width="50" height="18" rx="4" fill="#D1FAE5"/>
    <text x="169" y="13" text-anchor="middle" fill="#059669">consul</text>
    <rect x="198" width="38" height="18" rx="4" fill="#CFFAFE"/>
    <text x="217" y="13" text-anchor="middle" fill="#0891B2">k8s</text>
    <rect x="240" width="56" height="18" rx="4" fill="#F0FDF4"/>
    <text x="268" y="13" text-anchor="middle" fill="#16A34A">env-vars</text>
  </g>

  <!-- Row 2: Tech stacks -->
  <g transform="translate(350, 176)" font-family="monospace" font-size="10">
    <text x="0" y="-4" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8" font-weight="600">技术栈</text>
    <rect x="40" width="30" height="18" rx="4" fill="#FEF3C7"/>
    <text x="55" y="13" text-anchor="middle" fill="#B45309">Go</text>
    <rect x="74" width="38" height="18" rx="4" fill="#FEE2E2"/>
    <text x="93" y="13" text-anchor="middle" fill="#DC2626">Java</text>
    <rect x="116" width="40" height="18" rx="4" fill="#D1FAE5"/>
    <text x="136" y="13" text-anchor="middle" fill="#059669">Node</text>
    <rect x="160" width="34" height="18" rx="4" fill="#EDE9FE"/>
    <text x="177" y="13" text-anchor="middle" fill="#7C3AED">PHP</text>
    <rect x="198" width="52" height="18" rx="4" fill="#CFFAFE"/>
    <text x="224" y="13" text-anchor="middle" fill="#0891B2">Python</text>
    <rect x="260" width="42" height="18" rx="4" fill="#DBEAFE"/>
    <text x="281" y="13" text-anchor="middle" fill="#2563EB">React</text>
    <rect x="306" width="34" height="18" rx="4" fill="#DBEAFE"/>
    <text x="323" y="13" text-anchor="middle" fill="#2563EB">Vue</text>
    <rect x="344" width="46" height="18" rx="4" fill="#DBEAFE"/>
    <text x="367" y="13" text-anchor="middle" fill="#2563EB">Next.js</text>
  </g>

  <!-- Row 3: Tools -->
  <g transform="translate(350, 204)" font-family="monospace" font-size="10">
    <text x="0" y="-4" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8" font-weight="600">工具链</text>
    <rect x="40" width="28" height="18" rx="4" fill="#F1F5F9"/>
    <text x="54" y="13" text-anchor="middle" fill="#475569">init</text>
    <rect x="72" width="52" height="18" rx="4" fill="#F1F5F9"/>
    <text x="98" y="13" text-anchor="middle" fill="#475569">analyze</text>
    <rect x="128" width="44" height="18" rx="4" fill="#F1F5F9"/>
    <text x="150" y="13" text-anchor="middle" fill="#475569">doctor</text>
    <rect x="176" width="34" height="18" rx="4" fill="#F1F5F9"/>
    <text x="193" y="13" text-anchor="middle" fill="#475569">plan</text>
    <rect x="214" width="28" height="18" rx="4" fill="#F1F5F9"/>
    <text x="228" y="13" text-anchor="middle" fill="#475569">gen</text>
    <rect x="246" width="28" height="18" rx="4" fill="#F1F5F9"/>
    <text x="260" y="13" text-anchor="middle" fill="#475569">diff</text>
    <rect x="278" width="52" height="18" rx="4" fill="#F1F5F9"/>
    <text x="304" y="13" text-anchor="middle" fill="#475569">upgrade</text>
    <rect x="334" width="42" height="18" rx="4" fill="#EDE9FE"/>
    <text x="355" y="13" text-anchor="middle" fill="#7C3AED">apply</text>
  </g>
</svg>
