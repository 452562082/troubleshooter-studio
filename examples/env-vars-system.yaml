# 示例：纯环境变量驱动的系统（无远程配置中心）
# 典型场景：Docker Compose / 12-Factor 应用
system:
  id: simple-app
  name: "SimpleApp"
  description: "一个不用配置中心的简单系统"

agent:
  name: "SimpleApp排障机器人"
  workspace_name: "SimpleApp排障机器人"
  model: openai-codex/gpt-5.3-codex

environments:
  - id: dev
    api_domain: api-dev.simple.example.com
    is_prod: false
  - id: prod
    api_domain: api.simple.example.com
    is_prod: true

repos:
  - name: simple-api
    url: git@github.com:simple/simple-api.git
    stack: go
    service_names: [simple-api]
    env_branches:
      dev: develop
      prod: main

infrastructure:
  config_center:
    type: env-vars    # ← 无远程配置中心

  observability:
    grafana:
      enabled: true
      url_by_env:
        dev: "{{GRAFANA_DEV_URL}}"
        prod: "{{GRAFANA_PROD_URL}}"
    loki:
      enabled: true
      via_grafana: true
    prometheus:
      enabled: false

  data_stores:
    - type: redis
      enabled: true
      discovery: static
      readonly_enforced: true
      endpoints_by_env:
        dev: "redis-dev:6379"
        prod: "redis-prod:6379"
    - type: mongodb
      enabled: false
    - type: elasticsearch
      enabled: false

  messaging: []
  project_tracking: []

generation:
  targets: [openclaw]
  skills_whitelist:
    - routing
    - config-executor
    - redis-runtime-query
    - diagram-generator
meta:
  schema_version: "0.1"
