# 示例:事件驱动架构 —— 服务之间纯异步,没有同步 RPC。
#
# 典型场景:
#   订单下单 → 写 MQ(order.created)
#   库存扣减服务订阅 order.created → 扣库存 → 写 MQ(inventory.reserved)
#   支付服务订阅 inventory.reserved → 触发支付 → 写 MQ(payment.ok)
#   通知服务订阅 payment.ok → 发短信邮件
#
# 排障特点和同步架构不一样:
#   - trace 链路断在 MQ 边界(得按 message_id 串)
#   - 失败重试/死信队列是核心诊断维度
#   - 机器人需要会查 MQ topic 的积压量 / 消费组滞后
# tshoot 的 kafka-runtime-query / rocketmq-runtime-query skill 就是为此设计。

system:
  id: async-commerce
  name: "异步电商"
  description: "订单-库存-支付-通知 全链路 Kafka 串联,无同步 RPC"

agent:
  name: "异步电商排障机器人"
  workspace_name: "异步电商排障机器人"
  model: anthropic/claude-sonnet-4-6
  style:
    tone: direct
    verbosity: normal

environments:
  - id: dev
    api_domain: api-dev.async-commerce.example.com
    is_prod: false
  - id: prod
    api_domain: api.async-commerce.example.com
    is_prod: true

# 每个服务独立部署;彼此之间不调 HTTP/gRPC,全靠 Kafka topic 通信
repos:
  - name: order-service
    url: git@github.com:example/order-service.git
    stack: go
    service_names: [order-service]
    env_branches: {dev: develop, prod: main}

  - name: inventory-service
    url: git@github.com:example/inventory-service.git
    stack: go
    service_names: [inventory-service]
    env_branches: {dev: develop, prod: main}

  - name: payment-service
    url: git@github.com:example/payment-service.git
    stack: java
    framework: spring-boot
    service_names: [payment-service]
    env_branches: {dev: develop, prod: main}

  - name: notification-service
    url: git@github.com:example/notification-service.git
    stack: node
    service_names: [notification-service]
    env_branches: {dev: develop, prod: main}

infrastructure:
  config_center:
    type: nacos
    endpoints:
      - env: dev
        addr: "{{CONFIG_CENTER_ADDR_DEV}}"
      - env: prod
        addr: "{{CONFIG_CENTER_ADDR_PROD}}"
    auth:
      username_placeholder: "{{CONFIG_CENTER_USERNAME}}"
      password_placeholder: "{{CONFIG_CENTER_PASSWORD}}"

  observability:
    grafana:
      enabled: true
      url_by_env: {dev: "{{GRAFANA_DEV_URL}}", prod: "{{GRAFANA_PROD_URL}}"}
    prometheus:
      enabled: true
      via_grafana: true
      preferred_metrics:
        - kafka_consumer_lag
        - kafka_consumer_records_consumed_rate
    jaeger:
      enabled: true
      url_by_env: {dev: "{{JAEGER_DEV_URL}}", prod: "{{JAEGER_PROD_URL}}"}
    elk:
      enabled: true
      default_index: "async-commerce-*"
      kibana_by_env: {dev: "{{KIBANA_DEV_URL}}", prod: "{{KIBANA_PROD_URL}}"}
      es_by_env: {dev: "{{ELK_ES_DEV_URL}}", prod: "{{ELK_ES_PROD_URL}}"}

  # Kafka 是这套架构的核心,必选
  data_stores:
    - type: kafka
      enabled: true
      discovery: from_config_center
      readonly_enforced: true
    - type: mysql
      enabled: true
      discovery: from_config_center
      readonly_enforced: true
    - type: redis
      enabled: true
      discovery: from_config_center
      readonly_enforced: true

generation:
  targets: [openclaw]
  skills_whitelist:
    - routing
    - config-executor
    - kafka-runtime-query
    - mysql-runtime-query
    - redis-runtime-query
    - tracing-query
    - elk-log-query
    - diagram-generator

meta:
  schema_version: "0.1"
  tshoot_template_ref:
    repo: troubleshooter-studio
    ref: main
