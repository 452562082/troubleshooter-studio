# 同 shop 系统，但每个环境有独立的 Nacos/Grafana 账号
# 用于测试 per_env_credentials 开关
system:
  id: shop-multi-auth
  name: "Shop (multi-auth)"

agent:
  name: "Shop多账号排障机器人"
  workspace_name: "Shop多账号排障机器人"
  model: openai-codex/gpt-5.3-codex

environments:
  - id: dev
    api_domain: api-dev.shop.example.com
    is_prod: false
  - id: prod
    api_domain: api.shop.example.com
    is_prod: true

repos:
  - name: order-service
    url: git@github.com:shop/order-service.git
    role: backend
    stack: go
    service_names: [order-service]
    env_branches:
      dev: develop
      prod: main

infrastructure:
  config_center:
    type: nacos
    per_env_credentials: true    # ← 开启 per-env 凭证
    endpoints:
      - env: dev
        addr: "{{CC_ADDR_DEV}}"
        namespace_hint: "dev"
      - env: prod
        addr: "{{CC_ADDR_PROD}}"
        namespace_hint: "prod"

  observability:
    grafana:
      enabled: true
      per_env_credentials: true  # ← 开启 per-env 凭证
      url_by_env:
        dev: "{{GRAFANA_DEV_URL}}"
        prod: "{{GRAFANA_PROD_URL}}"
    loki:
      enabled: true
      via_grafana: true
    prometheus:
      enabled: false

  data_stores:
    - type: redis
      enabled: true
      discovery: from_config_center
      readonly_enforced: true
    - type: mongodb
      enabled: false
    - type: elasticsearch
      enabled: false

  messaging: []
  project_tracking: []

generation:
  target_host: openclaw
  output_dir: ./dist/shop-multi-auth
  skills_whitelist:
    - routing
    - config-executor
    - redis-runtime-query
    - diagram-generator

meta:
  schema_version: "0.1"
