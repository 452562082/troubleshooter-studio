# 三层架构示例：React 前端 + PHP 中间层(BFF) + Go 后端
system:
  id: mall
  name: "Mall"
  description: "电商系统：React 前端 → PHP BFF → Go 微服务"

agent:
  name: "Mall排障机器人"
  workspace_name: "Mall排障机器人"
  model: openai-codex/gpt-5.3-codex

environments:
  - id: dev
    api_domain: api-dev.mall.example.com
    web_domain: www-dev.mall.example.com
    is_prod: false
  - id: prod
    api_domain: api.mall.example.com
    web_domain: www.mall.example.com
    is_prod: true

repos:
  # 前端：React (Next.js)
  - name: mall-web
    url: git@github.com:mall/mall-web.git
    stack: node
    framework: next.js
    role: frontend
    env_branches:
      dev: develop
      prod: main

  # 中间层：PHP (Laravel) BFF
  - name: mall-bff
    url: git@github.com:mall/mall-bff.git
    stack: php
    framework: laravel
    role: gateway
    service_names:
      - mall-bff
    env_branches:
      dev: develop
      prod: main

  # 后端：Go 微服务
  - name: mall-order
    url: git@github.com:mall/mall-order.git
    stack: go
    service_names:
      - mall-order
    env_branches:
      dev: develop
      prod: main

code_intelligence:
  enabled: false                    # 显式 opt-in；关闭时不下载、不索引、不注册 MCP
  provider: codegraph               # 首版只支持 codegraph

# 跨仓库拓扑由部署期扫描自动生成；工作台确认/拒绝/补录后只把人工决策写回这里。
service_topology:
  overrides: []

infrastructure:
  config_center:
    type: nacos
    endpoints:
      - env: dev
        addr: "{{CONFIG_CENTER_ADDR_DEV}}"
        namespace_hint: "dev"
      - env: prod
        addr: "{{CONFIG_CENTER_ADDR_PROD}}"
        namespace_hint: "prod"

  observability:
    grafana:
      enabled: true
      url_by_env:
        dev: "{{GRAFANA_DEV_URL}}"
        prod: "{{GRAFANA_PROD_URL}}"
    loki:
      enabled: true
      via_grafana: true
    prometheus:
      enabled: true
      via_grafana: true

  data_stores:
    - type: redis
      enabled: true
      discovery: from_config_center
      readonly_enforced: true
    - type: mongodb
      enabled: false
    - type: elasticsearch
      enabled: false
    - type: mysql
      enabled: false

  messaging:
    - platform: lark
      enabled: true
      credentials:
        app_id_placeholder: "{{MESSAGING_APP_ID}}"
        app_secret_placeholder: "{{MESSAGING_APP_SECRET}}"
      attachment_send: true

  project_tracking: []

generation:
  targets: [openclaw]
  skills_whitelist:
    - routing
    - incident-investigator
    - config-executor
    - frontend-repro-investigator
    - service-topology-query
    - redis-runtime-query
    - diagram-generator
meta:
  schema_version: "0.1"
