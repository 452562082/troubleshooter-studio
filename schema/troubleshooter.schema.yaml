# ============================================================================
# troubleshooter.yaml —— 排障机器人工厂的输入契约
#
# 字段约定：
#   - 必填字段标 [required]，选填标 [optional]
#   - 凭证一律用 {{PLACEHOLDER}}，实际值由 install.sh 交互式输入、不进入 LLM 上下文
#   - 本文件既是 schema 说明，也是字段级注释，用户可按需裁剪生成自己的 troubleshooter.yaml
#
# 命名原则（系统无关）：
#   生成产物使用通用文件名，不带系统前缀。工作区本身已按 workspace_name 隔离。
#     env-domain-map.yaml
#     env-branch-map.yaml
#     config-map.yaml
#     log-app-map.yaml
#     observability-map.yaml
#     repo-stack-map.yaml
#   生成的 skill 名也不带系统语义（routing / config-executor / redis-runtime-query ...）
# ============================================================================

# ---------------------------------------------------------------------------
# 1. 系统元信息 —— 决定生成产物的命名与工作区路径
# ---------------------------------------------------------------------------
system:
  id: my-system                      # [required] 短标识，[a-z0-9-]，用于 agent-id 派生
  name: "My System"                  # [required] 系统显示名
  description: "示例系统，替换为你的业务描述"   # [optional] 一句话描述，写入 IDENTITY.md

# ---------------------------------------------------------------------------
# 2. Agent 画像 —— 决定生成的机器人人格与部署身份
# ---------------------------------------------------------------------------
agent:
  name: "AI排障机器人"                 # [required] 机器人显示名
  workspace_name: "AI排障机器人"       # [required] ~/.openclaw/workspace/<name>
  model: openai-codex/gpt-5.3-codex  # [required] OpenClaw agents.list 中的 model 标识

# ---------------------------------------------------------------------------
# 3. 环境清单 —— 生成 env-domain-map.yaml
# is_prod 决定 CHECKLIST.md 中的风险分级提示
# ---------------------------------------------------------------------------
environments:
  - id: dev                          # [required] 环境短 id
    aliases: [dev, develop]          # [optional] 用户口语里的叫法
    api_domain: api-dev.example.com  # [required if applicable] 主 API 入口
    web_domain: www-dev.example.com  # [optional]
    is_prod: false                   # [required]
    deployment_verification:        # [optional] 不填等价 manual；Studio 不执行部署
      provider: http                 # manual / http / k8s
      http:                          # provider=http 时必填；只发无鉴权 GET
        url: "https://api-dev.example.com/version"
        json_pointer: "/git/commit" # RFC 6901；可指向 commit 字符串或 repo→commit 对象
        allow_private: false        # 内网/loopback 版本接口需该环境显式 opt-in；云 metadata 永远拒绝
  - id: prod
    api_domain: api.example.com
    web_domain: www.example.com
    is_prod: true
    # K8s 示例（与 http 互斥）：
    # deployment_verification:
    #   provider: k8s
    #   k8s:
    #     cluster: prod-cluster
    #     namespace: my-system
    #     deployments_by_repo:       # key 必须是 repos[].name
    #       user-service: user-service
    #     commit_annotation: app.example.com/git-commit
    #     # image_label: git-commit  # 与 commit_annotation 二选一

# ---------------------------------------------------------------------------
# 4. 代码仓库清单 —— 生成 env-branch-map.yaml / repo-stack-map.yaml
# 同时是代码分析层输入：扫描语言/框架/服务名/配置文件
# ---------------------------------------------------------------------------
repos:
  - name: user-service               # [required] 仓库短名，作为 map key
    url: git@github.com:org/user-service.git   # [required]
    stack: go                        # [required] go / java / node / php / python / rust / ...
    framework: ""                    # [optional] 留空时由分析层推断
    service_names:                   # [optional] 一仓多服务时显式列出，提升路由映射准确度
      - user-service
    env_branches:                    # [required] 每个环境对应的分支或 tag
      dev: develop
      prod: main
    analysis:                        # [optional] 代码分析控制
      enabled: true
      shallow_depth: 50
      include_paths: []              # 留空=默认扫全部；填则仅扫这些路径

# ---------------------------------------------------------------------------
code_intelligence:
  enabled: false                    # 显式 opt-in；关闭时不下载、不索引、不注册 MCP
  provider: codegraph               # 首版只支持 codegraph

# 人工确认/拒绝/补录的跨服务调用边；服务名来自 service-node repo 的 service_names，
# 未声明 service_names 时回落到 repo.name。HTTP path 参数统一归一化为 {param}。
service_topology:
  overrides: []                     # [optional] 持久化拓扑审核结果；action: confirm / reject / add
  # overrides 示例：
  #   - action: confirm
  #     from_service: mall-web
  #     to_service: user-service
  #     protocol: http               # http 需 method + path，grpc 需 rpc_method
  #     method: GET
  #     path: /api/users/:id

# ---------------------------------------------------------------------------
# 5. 基础组件 —— 决定 mcp.servers.json 和 skills/ 生成内容
# 每类组件独立开关，按需生成对应 skill 与 MCP server
# ---------------------------------------------------------------------------
infrastructure:

  # 5.1 配置源 —— 决定 config-executor skill 使用的后端协议
  config_center:
    type: nacos                      # [required] nacos / apollo / consul / kuboard / one2all / env-vars / none
    endpoints:                       # [required for nacos/apollo/consul/kuboard/one2all] 每环境一套（env-vars 不需要）
      - env: dev
        addr: "{{CONFIG_CENTER_DEV_ADDR}}"
        namespace_hint: "dev"        # [optional] 辅助路由推断
      - env: prod
        addr: "{{CONFIG_CENTER_PROD_ADDR}}"
        namespace_hint: "prod"
    auth:
      username_placeholder: "{{CONFIG_CENTER_USERNAME}}"
      password_placeholder: "{{CONFIG_CENTER_PASSWORD}}"
    dataid_patterns:                 # [optional] 命名习惯，帮 AI 提升 config-map 准确率
      - "{service}.yaml"
      - "{service}-{env}.yaml"
    service_map:                     # [optional] 向导 Step 5 的"预加载 + 下拉"产物：每个环境的每个服务对应哪条配置
      dev:                           # key = env.id
        user:                        # key = service 名称（需与 repos[].service_names 对齐）
          namespace: "go-truss-dev"  # nacos namespaceId / apollo envId / consul kv prefix
          group: "DEFAULT_GROUP"     # nacos 独有，其他类型留空
          data_id: "user.yaml"       # nacos dataId / consul 完整 kv key（apollo 用 app_id 字段）
      prod:
        user:
          namespace: "go-truss-prod"
          group: "DEFAULT_GROUP"
          data_id: "user.yaml"

  # 5.2 可观测性 —— 决定 grafana / loki / prometheus / jaeger / elk / k8s_runtime MCP 与 skill 是否生成
  observability:
    grafana:
      enabled: true
      url_by_env:
        dev: "{{GRAFANA_DEV_URL}}"
        prod: "{{GRAFANA_PROD_URL}}"
      auth:
        username_placeholder: "{{GRAFANA_USERNAME}}"
        password_placeholder: "{{GRAFANA_PASSWORD}}"
    loki:
      enabled: true
      via_grafana: true              # true=走 Grafana 代理(用 datasource_uid_by_env);false=直连 endpoint
      datasource_uid_by_env:         # [optional] via_grafana 模式记录每 env 选中的 Loki datasource UID
        dev: "<loki-ds-uid-dev>"
        prod: "<loki-ds-uid-prod>"
    prometheus:
      enabled: true
      via_grafana: true
      preferred_metrics: []          # [optional] 写入 observability-map.yaml
      datasource_uid_by_env:         # [optional] 同上,Prometheus 在 Grafana 里的 ds UID
        dev: "<prom-ds-uid-dev>"
        prod: "<prom-ds-uid-prod>"
    jaeger:
      enabled: false                 # [optional] 用 Jaeger 时打开
      url_by_env:
        dev: "{{JAEGER_DEV_URL}}"
        prod: "{{JAEGER_PROD_URL}}"
      datasource_uid_by_env: {}      # [optional] via_grafana 时填
    elk:
      enabled: false                 # [optional] 用 ELK 时打开
      kibana_by_env:
        dev: "{{KIBANA_DEV_URL}}"
        prod: "{{KIBANA_PROD_URL}}"
      es_by_env:
        dev: "{{ELK_ES_DEV_URL}}"
        prod: "{{ELK_ES_PROD_URL}}"
      default_index: "my-system-logs-*"
      auth:
        username_placeholder: "{{ELK_USERNAME}}"
        password_placeholder: "{{ELK_PASSWORD}}"
      datasource_uid_by_env: {}
    skywalking:
      enabled: false
      url_by_env:
        dev: "{{SKYWALKING_DEV_URL}}"
    tempo:
      enabled: false
      url_by_env:
        dev: "{{TEMPO_DEV_URL}}"
      via_grafana: true
      datasource_uid_by_env: {}
    # 5.2.1 K8s 运行时 —— 通过 Kuboard v4 API 查 pod / events / logs / deployment;
    # 跟"配置源 kuboard"正交,用户从 nacos 读配置仍可在这里查 K8s 运行时。
    k8s_runtime:
      enabled: false
      url_by_env:
        dev: "{{KUBOARD_DEV_URL}}"
        prod: "{{KUBOARD_PROD_URL}}"
      auth:
        username_placeholder: "{{KUBOARD_USERNAME}}"
        password_placeholder: "{{KUBOARD_PASSWORD}}"
      service_map:                   # [optional] (env, service) → cluster/namespace/workload/label_selector
        - env: dev                   # routing skill 解析时用,workload+selector 至少有一个
          service: user
          cluster: dev-cluster
          namespace: shop-dev
          workload: user-service     # Deployment 名
          label_selector: app=user-service  # 自动从 spec.selector.matchLabels 取

  # 5.3 数据层 —— 决定是否生成对应 runtime-query skill
  # discovery:
  #   - from_config_center: 从配置中心解析连接串
  #   - static: 走下方 static_endpoints
  #   - both: 优先 config_center，兜底 static
  data_stores:
    - type: redis                    # redis / mongodb / elasticsearch / mysql / doris / kafka / ...
      enabled: true
      discovery: from_config_center
      readonly_enforced: true        # 必须 true，生成的 skill 禁止写
      static_endpoints: []           # discovery=static/both 时用（legacy flat list）
      endpoints_by_env:              # [optional] 按 env 声明静态连接串（env-vars/kuboard/one2all 模式常用）
        dev: "redis-dev:6379"
        prod: "redis-prod:6379"
    - type: mongodb
      enabled: true
      discovery: from_config_center
      readonly_enforced: true
    - type: elasticsearch
      enabled: true
      discovery: from_config_center
      readonly_enforced: true
    - type: mysql
      enabled: false
    - type: kafka
      enabled: false

  # 5.4 消息/IM 通道 —— 决定附件发送链路走哪个 MCP
  messaging:
    - platform: lark                 # lark / slack / dingtalk / telegram / wechat-work
      enabled: true
      credentials:
        app_id_placeholder: "{{MESSAGING_APP_ID}}"
        app_secret_placeholder: "{{MESSAGING_APP_SECRET}}"
      attachment_send: true          # 是否用于发送图类附件（mermaid 产物）

  # 5.5 项目/需求管理 —— 决定是否生成对应 MCP
  project_tracking:
    - platform: none                 # feishu_project / jira / linear / none
      enabled: false

# ---------------------------------------------------------------------------
# 6. 生成偏好 —— 控制产物形态、部署目标、再生成策略
# ---------------------------------------------------------------------------
generation:
  targets:                           # [required] 部署目标列表(openclaw / claude-code / cursor;可多选)
    - openclaw
  skills_whitelist:                  # [optional] 覆盖默认全量 skills
    - routing                        # 环境/服务路由映射
    - config-executor                # 配置中心读/历史/对比
    - redis-runtime-query
    - mongodb-runtime-query
    - es-runtime-query
    - diagram-generator              # 对标 mermaid-image-generator，改名以避免绑定实现

# ---------------------------------------------------------------------------
# 7. 元数据 —— 生成器自身的版本管理
# ---------------------------------------------------------------------------
meta:
  schema_version: "0.1"              # [required] 随 tshoot 演进
  tshoot_template_ref:               # [optional] 基于哪个骨架模板版本生成
    repo: troubleshooter-studio
    ref: main
