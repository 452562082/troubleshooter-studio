# known-errors.yaml —— 经典错误模式速查
#
# agent 看到日志/异常/tool error 文本时先 grep pattern,命中即按 next_actions 走。
# 只列最高频的 10 条(K8s 5 + RPC/网络 3 + DB 1 + 应用 1)。
# 偏门错误(REBALANCE / Lock wait / 401 / Connection reset 等)LLM 自己能推,不浪费 token 列。
#
# causation_chain.check_downstream_for: 命中后主动跑 cascade_check 看下游是否出现这些模式;
# 命中 → 真因在下游,把那个下游当主角递归 6 步流程。

errors:
  # ── K8s ──────────────────────────────────────────────
  - pattern: "OOMKilled"
    typical_cause: "容器内存超 limits"
    next_actions:
      - "rollout-history 看是否最近改了镜像/配置导致内存峰值"
      - "list-deployments 看 limits.memory 是否过紧"
      - "看启动期是否大字典/缓存预热"
    mitigation: "临时调大 limits.memory +50%"
    causation_chain:
      check_upstream_for: ["context deadline exceeded", "connection refused", "502 Bad Gateway"]
      explanation: "本服务 OOM,上游必 timeout/连不上"

  - pattern: "CrashLoopBackOff"
    typical_cause: "容器反复启动失败"
    next_actions:
      - "get-pod-logs --previous=true 取上次崩溃栈(关键)"
      - "list-events --only-warnings 看 BackOff/Killing"
      - "启动期 panic/Error → 配置错;运行中 → 业务 bug 或下游不可用"
    mitigation: "kubectl rollout undo 或 Kuboard 后台回滚到上一个 revision"

  - pattern: "ImagePullBackOff"
    typical_cause: "镜像拉不下来:tag 错 / 没推上去 / pullSecrets 失效"
    next_actions:
      - "list-events 看 'manifest unknown'/'unauthorized'/'i/o timeout'"
      - "deployment.spec.containers.image tag 跟 CI 输出对照"

  - pattern: "FailedScheduling"
    typical_cause: "调度失败:资源不足 / nodeSelector/taint 不匹配"
    next_actions:
      - "list-events 看 '0/N nodes are available' 后的具体原因"
      - "Insufficient cpu/memory → 集群资源吃紧;PVC 未绑 → StorageClass 问题"

  - pattern: "Evicted"
    typical_cause: "节点资源压力(磁盘/内存)驱逐 pod"
    next_actions:
      - "list-events 看 'DiskPressure'/'MemoryPressure'"
      - "节点磁盘:常见日志/缓存写爆 root volume"

  # ── RPC / 网络 ──────────────────────────────────────
  - pattern: "context deadline exceeded"
    typical_cause: "RPC 超时:下游慢 / 网络丢包 / 限流命中"
    next_actions:
      - "trace 找超时 span(走 default_tracing skill)"
      - "PromQL 看下游 p99 是否突变(用 baseline_query_templates 跟 24h 前比)"
      - "下游 K8s pod 是否健康(ns-snapshot)"
    causation_chain:
      check_downstream_for: ["OOMKilled", "CrashLoopBackOff", "Too many connections"]
      explanation: "上游 timeout 常因下游慢/崩;命中下游模式时真因几乎一定在下游"

  - pattern: "connection refused"
    typical_cause: "目标服务没起 / 端口错 / 防火墙阻断"
    next_actions:
      - "ns-snapshot 看目标 service 后端 pod 是否 Running+Ready"
      - "list-services 看 selector 是否匹配 / targetPort 跟容器监听端口一致"
      - "都对则查 NetworkPolicy / Service Mesh sidecar"
    causation_chain:
      check_downstream_for: ["CrashLoopBackOff", "ImagePullBackOff", "OOMKilled", "FailedScheduling"]
      explanation: "拒连接最常见原因:下游 pod 起不来"

  - pattern: "502 Bad Gateway"
    typical_cause: "Gateway 拿不到后端响应:后端崩 / 重启 / 超 keepalive"
    next_actions:
      - "看后端 service pod 状态(list-pods)"
      - "Gateway 日志的 upstream addr → 定位具体后端节点"
    causation_chain:
      check_downstream_for: ["OOMKilled", "CrashLoopBackOff", "panic:", "OutOfMemoryError"]
      explanation: "Gateway 502 几乎一定是后端服务挂了"

  # ── DB ────────────────────────────────────────────
  - pattern: "Too many connections"
    typical_cause: "MySQL 连接池打满"
    next_actions:
      - "应用 max-pool-size vs MySQL max_connections 对比"
      - "SHOW PROCESSLIST 看慢查询是否堆积占连接"
      - "应用是否有连接泄漏(未 close)"
    mitigation: "立即重启实例释放连接(谨慎,只解症状)"
    causation_chain:
      check_upstream_for: ["context deadline exceeded"]
      explanation: "DB 连接打满时所有调 DB 的服务都会 cascade fail"

  # ── MQ ────────────────────────────────────────────
  - pattern: "REBALANCE_IN_PROGRESS|GroupRebalancing|RebalanceInProgress"
    typical_cause: "Kafka 消费者组重平衡中,临时不可消费"
    next_actions:
      - "看是否最近频繁加减消费者实例 / max.poll.interval.ms 太短被踢出"
      - "session.timeout.ms / heartbeat.interval.ms 是否合理"

  - pattern: "MessageTooLargeError|RecordTooLargeException"
    typical_cause: "消息超 broker max.message.bytes / 客户端 max.request.size"
    next_actions:
      - "看消息大小分布(业务是否传了大字段如完整图片 base64)"
      - "broker message.max.bytes 跟客户端 max.request.size 调一致"

  # ── Redis ────────────────────────────────────────
  - pattern: "WRONGTYPE Operation"
    typical_cause: "对 key 用了错误类型操作(对 list 跑 HGET / 对 string 跑 ZADD)"
    next_actions:
      - "redis-runtime-query TYPE <key> 确认实际类型"
      - "看代码:同一个 key 是否被多处用不同类型写入"

  # ── 应用 ──────────────────────────────────────────
  - pattern: "panic:|java.lang.OutOfMemoryError"
    typical_cause: "应用崩溃:Go panic / Java OOM"
    next_actions:
      - "logs_previous 取上次崩溃栈,定位具体文件:行号"
      - "rollout-history 看是否最近发版引入(对比 image tag)"
      - "Java OOM 看 -Xmx 是否超容器 limits.memory"
