<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 跟 logo.svg 用同一套色调:蓝紫 g1 + 橙红 g2 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="robot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <!-- 机器人下投影,跟蓝紫底色拉开层级 -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="20" result="offsetblur"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角方形背景(蓝紫渐变) -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- 顶部高光,加质感 -->
  <rect x="0" y="0" width="1024" height="280" rx="200" fill="white" opacity="0.06"/>

  <!-- AI 机器人:居中,占满更多视觉份额(底部不再有卡片缩影,空出来给主图) -->
  <g transform="translate(512, 532)" filter="url(#shadow)">
    <!-- 天线 -->
    <line x1="0" y1="-300" x2="0" y2="-380" stroke="#F97316" stroke-width="20" stroke-linecap="round"/>
    <circle cx="0" cy="-396" r="36" fill="#F97316"/>
    <!-- 头(身体)主框 -->
    <rect x="-300" y="-300" width="600" height="500" rx="80" fill="url(#robot)"/>
    <!-- 头顶高光 -->
    <rect x="-260" y="-280" width="520" height="60" rx="40" fill="white" opacity="0.18"/>
    <!-- 两只眼睛 -->
    <circle cx="-110" cy="-100" r="68" fill="white"/>
    <circle cx="110" cy="-100" r="68" fill="white"/>
    <circle cx="-96" cy="-100" r="32" fill="#1E293B"/>
    <circle cx="124" cy="-100" r="32" fill="#1E293B"/>
    <!-- 眼睛高光 -->
    <circle cx="-104" cy="-114" r="11" fill="white" opacity="0.95"/>
    <circle cx="116" cy="-114" r="11" fill="white" opacity="0.95"/>
    <!-- 嘴(条纹带) -->
    <rect x="-150" y="46" width="300" height="48" rx="22" fill="#FEF3C7"/>
    <line x1="-90" y1="46" x2="-90" y2="94" stroke="#F97316" stroke-width="9"/>
    <line x1="-25" y1="46" x2="-25" y2="94" stroke="#F97316" stroke-width="9"/>
    <line x1="40" y1="46" x2="40" y2="94" stroke="#F97316" stroke-width="9"/>
    <line x1="105" y1="46" x2="105" y2="94" stroke="#F97316" stroke-width="9"/>
  </g>
</svg>
