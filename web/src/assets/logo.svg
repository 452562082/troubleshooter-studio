<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140">
  <defs>
    <!-- 蓝紫渐变(studio 窗口) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- 橙红渐变(机器人) -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- 左:studio 桌面窗口(简化版,只保留 title bar + 卡片轮廓) -->
  <g transform="translate(16, 22)">
    <rect x="0" y="0" width="100" height="96" rx="10" fill="url(#g1)"/>
    <!-- title bar + traffic lights -->
    <rect x="0" y="0" width="100" height="18" rx="10" fill="#1E293B" opacity="0.35"/>
    <rect x="0" y="10" width="100" height="8" fill="#1E293B" opacity="0.35"/>
    <circle cx="9" cy="9" r="3" fill="#EF4444"/>
    <circle cx="18" cy="9" r="3" fill="#F59E0B"/>
    <circle cx="27" cy="9" r="3" fill="#22C55E"/>
    <!-- 三张机器人卡 -->
    <rect x="12" y="28" width="76" height="14" rx="3" fill="#DBEAFE" opacity="0.92"/>
    <rect x="12" y="46" width="76" height="14" rx="3" fill="#DBEAFE" opacity="0.78"/>
    <rect x="12" y="64" width="76" height="14" rx="3" fill="#DBEAFE" opacity="0.62"/>
    <!-- 状态点 -->
    <circle cx="20" cy="35" r="2.5" fill="#22C55E"/>
    <circle cx="20" cy="53" r="2.5" fill="#22C55E"/>
    <circle cx="20" cy="71" r="2.5" fill="#F59E0B"/>
  </g>

  <!-- 中:箭头 -->
  <g transform="translate(126, 68)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="22,-5 32,0 22,5" fill="#94A3B8"/>
  </g>

  <!-- 右:AI 机器人(头 + 天线 + 眼睛) -->
  <g transform="translate(166, 30)">
    <!-- 天线 -->
    <line x1="36" y1="0" x2="36" y2="-12" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="36" cy="-15" r="4" fill="url(#g2)"/>
    <!-- 头 -->
    <rect x="0" y="0" width="72" height="62" rx="14" fill="url(#g2)"/>
    <!-- 眼睛 -->
    <circle cx="22" cy="26" r="9" fill="white"/>
    <circle cx="50" cy="26" r="9" fill="white"/>
    <circle cx="24" cy="26" r="4.5" fill="#1E293B"/>
    <circle cx="52" cy="26" r="4.5" fill="#1E293B"/>
    <!-- 嘴(条纹带) -->
    <rect x="14" y="44" width="44" height="8" rx="4" fill="#FEF3C7"/>
    <line x1="26" y1="44" x2="26" y2="52" stroke="url(#g2)" stroke-width="1.5"/>
    <line x1="36" y1="44" x2="36" y2="52" stroke="url(#g2)" stroke-width="1.5"/>
    <line x1="46" y1="44" x2="46" y2="52" stroke="url(#g2)" stroke-width="1.5"/>
  </g>

  <!-- 文字:wordmark + tagline -->
  <g transform="translate(266, 60)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#1E293B" letter-spacing="-0.5">
      troubleshooter
    </text>
    <text y="36" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="url(#g1)" letter-spacing="-0.5">
      studio
    </text>
    <text y="64" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#64748B" letter-spacing="0.5">
      AI 排障机器人工作台
    </text>
  </g>
</svg>
